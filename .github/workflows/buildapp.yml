name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run tests
        run: |
          pytest tests/ -v --cov=app --cov-report=term-missing || echo "No tests found, skipping..."

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v5

      - name: Deploy to EC2
        env:
          PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USER }}
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "$PRIVATE_KEY" | tr -d '\r' > ~/.ssh/private_key.pem
          chmod 600 ~/.ssh/private_key.pem

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/private_key.pem ${USER}@${HOST} "mkdir -p /home/${USER}/app"

          scp -o StrictHostKeyChecking=no -i ~/.ssh/private_key.pem -r ./* ${USER}@${HOST}:/home/${USER}/app/

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/private_key.pem ${USER}@${HOST} << EOF
            set -e

            mkdir -p /home/${USER}/app
            cd /home/${USER}/app

            if ! command -v pip3 >/dev/null 2>&1; then
              echo "Installing Python pip..."
              sudo apt-get update
              sudo apt-get install -y python3-pip python3-venv
            fi

            python3 -m venv venv || true
            source venv/bin/activate

            pip install --upgrade pip
            pip install -r requirements.txt

            pkill -f "uvicorn app.main:app" || true

            nohup /home/${USER}/app/venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000 > /home/${USER}/app/app.log 2>&1 &

            sleep 3
            pgrep -af uvicorn || true

            echo "Deployment completed successfully!"
          EOF

          rm -f ~/.ssh/private_key.pem