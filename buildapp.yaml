version: 0.2

env:
  variables:
    IMAGE_NAME: incubyte-salary-management-kata
    IMAGE_TAG: latest

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - echo "Install phase started"
      - python --version
      - pip install --upgrade pip
      - pip install -r requirement.txt

  pre_build:
    commands:
      - echo "Pre-build phase started"
      - echo "Running tests"
      - pytest tests || true

  build:
    commands:
      - echo "Build phase started"
      - echo "Building Docker image"
      - docker build -t $IMAGE_NAME:$IMAGE_TAG .

  post_build:
    commands:
      - echo "Post-build phase completed"
      - docker images

artifacts:
  files:
    - '**/*'